[package]
name = "sdkwork-utils-rust"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "SDKWork cross-language utility library for Rust"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"
rand = "0.8"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hmac = "0.12"
urlencoding = "2"
# 对称加密：AES-256-GCM（机密字段落库加密）
aes-gcm = "0.10"
# 密钥派生：HKDF-SHA256（替代裸 SHA-256 摘要做密钥）
hkdf = "0.12"

[dev-dependencies]
pretty_assertions = "1"
